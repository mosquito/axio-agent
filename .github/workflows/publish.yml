name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_COLOR: 1

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - axio
          - axio-tools-docker
          - axio-tools-local
          - axio-tools-mcp
          - axio-transport-codex
          - axio-transport-openai
          - axio-tui
          - axio-tui-guards
          - axio-tui-rag
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Set version from tag
        working-directory: ${{ matrix.package }}
        run: uv version "${GITHUB_REF_NAME#v}"

      - name: Build package
        working-directory: ${{ matrix.package }}
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: ${{ matrix.package }}/dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - axio
          - axio-tools-docker
          - axio-tools-local
          - axio-tools-mcp
          - axio-transport-codex
          - axio-transport-openai
          - axio-tui
          - axio-tui-guards
          - axio-tui-rag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
